name: Build Mobile Artifacts
run-name: ${{ github.event.head_commit.message || github.ref_name }}

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  android:
    name: Build unsigned APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Set artifact name
        run: |
          set -euo pipefail
          SUBJECT="$(git log -1 --pretty=%s)"
          SAFE_SUBJECT="$(printf "%s" "$SUBJECT" | tr '/\\":<>|*?' '-' | tr -s '[:space:]' ' ' | cut -c 1-80)"
          echo "ARTIFACT_NAME=Paynest-${SAFE_SUBJECT}-unsigned-APK" >> "$GITHUB_ENV"

      - name: Build unsigned APK
        run: ./scripts/build-unsigned-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/android/*.apk
          if-no-files-found: error

  ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List available Xcode versions
        run: ls -1 /Applications/ | grep Xcode || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Set artifact name
        run: |
          set -euo pipefail
          SUBJECT="$(git log -1 --pretty=%s)"
          SAFE_SUBJECT="$(printf "%s" "$SUBJECT" | tr '/\\":<>|*?' '-' | tr -s '[:space:]' ' ' | cut -c 1-80)"
          echo "ARTIFACT_NAME=Paynest-${SAFE_SUBJECT}-unsigned-IPA" >> "$GITHUB_ENV"

      - name: Build unsigned IPA
        run: ./scripts/build-unsigned-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/ios/*.ipa
          if-no-files-found: error
