name: Build Mobile Artifacts

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-mobile.yml"
      - "scripts/**"
      - "src/**"
      - "assets/**"
      - "App.tsx"
      - "app.json"
      - "babel.config.js"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  android:
    name: Build unsigned APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned APK
        run: ./scripts/build-unsigned-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paynest-unsigned-APK
          path: build/android/*.apk
          if-no-files-found: error

  ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List available Xcode versions
        run: ls -1 /Applications/ | grep Xcode || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Build unsigned IPA
        run: ./scripts/build-unsigned-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paynest-unsigned-IPA
          path: build/ios/*.ipa
          if-no-files-found: error
