name: Build Mobile Artifacts
run-name: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  EXPO_PUBLIC_POCKETBASE_URL: ${{ secrets.EXPO_PUBLIC_POCKETBASE_URL }}

jobs:
  android:
    name: Build unsigned APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Set artifact name
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_REF_NAME:-}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "$REF_NAME" ]; then
            BUILD_ID="$REF_NAME"
          else
            BUILD_ID="$(git rev-parse --short HEAD)"
          fi

          SAFE_BUILD_ID="$(printf "%s" "$BUILD_ID" | tr '/\\":<>|*?' '-' | tr -s '[:space:]' '-')"
          echo "ARTIFACT_NAME=Paynest-${SAFE_BUILD_ID}-unsigned-APK" >> "$GITHUB_ENV"

      - name: Build unsigned APK
        run: ./scripts/build-unsigned-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/android/*.apk
          if-no-files-found: error

  ios:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List available Xcode versions
        run: ls -1 /Applications/ | grep Xcode || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Set artifact name
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_REF_NAME:-}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "$REF_NAME" ]; then
            BUILD_ID="$REF_NAME"
          else
            BUILD_ID="$(git rev-parse --short HEAD)"
          fi

          SAFE_BUILD_ID="$(printf "%s" "$BUILD_ID" | tr '/\\":<>|*?' '-' | tr -s '[:space:]' '-')"
          echo "ARTIFACT_NAME=Paynest-${SAFE_BUILD_ID}-unsigned-IPA" >> "$GITHUB_ENV"

      - name: Build unsigned IPA
        run: ./scripts/build-unsigned-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/ios/*.ipa
          if-no-files-found: error
